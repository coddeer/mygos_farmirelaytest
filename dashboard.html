<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Mygos Farmi — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b27;--surface2:#1e2435;
      --border:#2a3048;--text:#e8eaf0;--dim:#7a8299;
      --hdr-h:56px;--tab-h:48px;
    }
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
      padding-top:calc(var(--hdr-h) + var(--tab-h));min-height:100vh}

    /* HEADER */
    .hdr{
      position:fixed;top:0;left:0;right:0;height:var(--hdr-h);
      background:linear-gradient(135deg,#0d1b2e 0%,#0a2440 50%,#0d2b1e 100%);
      border-bottom:1px solid #1a3a5c;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 16px;z-index:300;
    }
    .hdr-left{display:flex;align-items:center;gap:10px}
    .hdr-badge{font-size:.65rem;font-weight:700;letter-spacing:1px;color:#00e676;
      border:1px solid #00e676;border-radius:4px;padding:2px 6px}
    .hdr-title{font-size:.8rem;font-weight:600}
    .hdr-sub{font-size:.65rem;color:var(--dim)}
    .hdr-clock{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;padding:0 8px}
    .hdr-clock-date{font-size:.56rem;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
    .hdr-clock-time{font-size:1rem;font-weight:700;font-family:'Courier New',monospace;
      background:linear-gradient(90deg,#18ffff,#64ffda);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
    .hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .hdr-status{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--dim)}
    .dot{width:8px;height:8px;border-radius:50%;background:#00e676;
      box-shadow:0 0 6px #00e676;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* TAB BAR */
    .tabbar{
      position:fixed;top:var(--hdr-h);left:0;right:0;height:var(--tab-h);
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;overflow-x:auto;z-index:200;scrollbar-width:none;
    }
    .tabbar::-webkit-scrollbar{display:none}
    .tab{
      flex:0 0 auto;padding:0 16px;height:100%;
      display:flex;align-items:center;gap:7px;
      font-size:.72rem;font-weight:600;color:var(--dim);
      cursor:pointer;border-bottom:2px solid transparent;
      white-space:nowrap;transition:color .2s,border-color .2s;
    }
    .tab.active{color:var(--text);border-bottom-color:var(--ac)}
    .tab-icon{font-size:.9rem}

    /* PAGE */
    .page{padding:14px;max-width:960px;margin:0 auto}

    .sim-badge{
      display:inline-flex;align-items:center;gap:5px;
      background:#ff6d0020;border:1px solid #ff6d0060;
      color:#ff6d00;font-size:.65rem;font-weight:600;
      border-radius:20px;padding:4px 10px;margin-bottom:14px
    }

    /* MAIN CARD */
    .main-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:20px;margin-bottom:12px;
      display:flex;align-items:center;gap:20px;
    }
    .main-icon{font-size:2.4rem;line-height:1}
    .main-val{font-size:3rem;font-weight:700;line-height:1;color:var(--ac)}
    .main-unit{font-size:1.1rem;font-weight:400;color:var(--dim);margin-left:4px}
    .main-label{font-size:.65rem;font-weight:600;letter-spacing:1px;color:var(--dim);
      text-transform:uppercase;margin-bottom:4px}
    .main-time{font-size:.7rem;color:var(--dim);margin-top:4px}
    .main-bar{flex:1;height:6px;border-radius:3px;background:var(--surface2);overflow:hidden}
    .main-bar-fill{height:100%;border-radius:3px;background:var(--ac);transition:width .6s}

    /* CHART CARD */
    .chart-card{background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:16px}
    .chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
    .chart-title{font-size:.75rem;font-weight:600}
    .chart-meta{font-size:.65rem;color:var(--dim)}
    .chart-wrap{position:relative;height:240px}

    /* PERIOD SELECTOR */
    .period-btns{display:flex;gap:4px;flex-shrink:0}
    .pbtn{
      padding:4px 10px;border-radius:10px;border:1px solid var(--border);
      background:var(--surface2);color:var(--dim);
      font-size:.65rem;font-weight:600;cursor:pointer;
      transition:background .15s,color .15s,border-color .15s;
    }
    .pbtn.active{background:var(--ac);color:#0d1117;border-color:var(--ac)}

    /* CHANGE BADGE */
    .change-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .change-badge{
      display:flex;align-items:center;gap:5px;
      background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;padding:8px 12px;flex:1;min-width:80px;
    }
    .change-badge .cb-lbl{font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
    .change-badge .cb-val{font-size:.88rem;font-weight:700;margin-top:2px}
    .change-badge .cb-pct{font-size:.62rem;margin-top:1px}
    .up{color:#00e676}.down{color:#ff5252}.flat{color:var(--dim)}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .stat{background:var(--surface2);border-radius:8px;padding:10px;text-align:center}
    .stat-val{font-size:1rem;font-weight:700;color:var(--ac)}
    .stat-lbl{font-size:.6rem;color:var(--dim);margin-top:2px}

    /* HIDDEN SECTIONS */
    .section{display:none}
    .section.active{display:block}
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-badge">MyFarmi</div>
    <div>
      <div class="hdr-title">Mygos Technology</div>
    </div>
  </div>
  <div class="hdr-clock">
    <span class="hdr-clock-date" id="hdr-date">--- -- --- ----</span>
    <span class="hdr-clock-time" id="hdr-time">--:--:--</span>
  </div>
  <div class="hdr-right">
    <button onclick="window.location.href='index.html'" style="background:#1e2435;border:1px solid #2a3048;border-radius:8px;padding:6px 12px;color:#e8eaf0;font-size:.8rem;cursor:pointer">‹ Back</button>
    <div class="hdr-status">
      <div class="dot"></div>
      <span>Simulation</span>
    </div>
  </div>
</header>

<nav class="tabbar" id="tabbar"></nav>

<div class="page">
  <div class="sim-badge">⚠ Simulation data</div>
  <div id="sections"></div>
</div>

<script>
const SENSORS = [
  { id:"ph",        label:"pH",         icon:"🧪", unit:"pH",    color:"#64ffda", min:4,    max:9,     start:7.2,  step:.03,  decimals:2 },
  { id:"ec",        label:"EC",         icon:"⚡", unit:"mS/cm", color:"#40c4ff", min:0,    max:5,     start:1.8,  step:.05,  decimals:2 },
  { id:"co2",       label:"CO₂",        icon:"💨", unit:"ppm",   color:"#ff5252", min:300,  max:2000,  start:820,  step:8,    decimals:0 },
  { id:"watertemp", label:"Water Temp", icon:"💧", unit:"°C",    color:"#18ffff", min:10,   max:35,    start:22.4, step:.15,  decimals:1 },
  { id:"airtemp",   label:"Air Temp",   icon:"🌡️", unit:"°C",    color:"#ffab40", min:10,   max:45,    start:24.1, step:.2,   decimals:1 },
  { id:"humidity",  label:"Humidity",   icon:"💦", unit:"%",     color:"#e040fb", min:20,   max:100,   start:61,   step:.4,   decimals:1 },
  { id:"light",     label:"Light",      icon:"☀️", unit:"lux",   color:"#ffd740", min:0,    max:60000, start:15200,step:200,  decimals:0 },
  { id:"flow",      label:"Flow",       icon:"🌊", unit:"L/min", color:"#00e676", min:0,    max:15,    start:4.6,  step:.08,  decimals:2 },
];

const MAX_PTS = 30;
const state   = {};

// ── Generate historical data ───────────────────────────────────────────────
function genHistory(s, count, stepMult) {
  const vals = [], now = new Date();
  let cur = s.start;
  for (let i = 0; i < count; i++) {
    cur = Math.max(s.min, Math.min(s.max, cur + (Math.random() - .48) * s.step * stepMult));
    vals.push(parseFloat(cur.toFixed(s.decimals)));
  }
  return vals;
}

function dailyLabels() {
  const labels = [];
  for (let h = 0; h < 24; h++) labels.push(String(h).padStart(2,"0") + ":00");
  return labels;
}

function monthlyLabels() {
  const now = new Date();
  const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const labels = [];
  for (let d = 1; d <= days; d++) labels.push(d + " " + months[now.getMonth()]);
  return labels;
}

const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function yearlyLabels() { return [...MONTH_NAMES]; }

// ── Build UI ──────────────────────────────────────────────────────────────
const tabbar   = document.getElementById("tabbar");
const sections = document.getElementById("sections");

const dayLbls  = dailyLabels();
const monLbls  = monthlyLabels();
const yrLbls   = yearlyLabels();

SENSORS.forEach((s, i) => {
  const histDay  = genHistory(s, 24,  6);
  const histMon  = genHistory(s, monLbls.length, 12);
  const histYear = genHistory(s, 12, 20);

  state[s.id] = {
    vals: [], cur: s.start,
    histDay, histMon, histYear,
    period: "live"
  };

  // Tab
  const t = document.createElement("div");
  t.className = "tab" + (i===0?" active":"");
  t.dataset.id = s.id;
  t.style.setProperty("--ac", s.color);
  t.innerHTML = `<span class="tab-icon">${s.icon}</span>${s.label}`;
  t.addEventListener("click", () => switchTab(s.id));
  tabbar.appendChild(t);

  // Section
  const sec = document.createElement("div");
  sec.className = "section" + (i===0?" active":"");
  sec.id = "sec-" + s.id;
  sec.style.setProperty("--ac", s.color);
  sec.innerHTML = `
    <div class="main-card">
      <div class="main-icon">${s.icon}</div>
      <div style="flex:1">
        <div class="main-label">${s.label}</div>
        <div>
          <span class="main-val" id="val-${s.id}">--</span>
          <span class="main-unit">${s.unit}</span>
        </div>
        <div class="main-time" id="time-${s.id}">—</div>
      </div>
      <div style="width:120px">
        <div class="main-bar"><div class="main-bar-fill" id="bar-${s.id}" style="width:0%"></div></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-hdr">
        <div>
          <div class="chart-title">${s.label} Trend</div>
          <div class="chart-meta" id="meta-${s.id}">last 30 readings · 2 s interval</div>
        </div>
        <div class="period-btns">
          <button class="pbtn active" id="pb-live-${s.id}" onclick="switchPeriod('${s.id}','live')">Live</button>
          <button class="pbtn"        id="pb-day-${s.id}"  onclick="switchPeriod('${s.id}','day')">Day</button>
          <button class="pbtn"        id="pb-mon-${s.id}"  onclick="switchPeriod('${s.id}','mon')">Month</button>
          <button class="pbtn"        id="pb-year-${s.id}" onclick="switchPeriod('${s.id}','year')">Year</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart-${s.id}"></canvas></div>
      <div class="change-row" id="changes-${s.id}" style="display:none"></div>
      <div class="stats">
        <div class="stat"><div class="stat-val" id="min-${s.id}">—</div><div class="stat-lbl">Min ${s.unit}</div></div>
        <div class="stat"><div class="stat-val" id="avg-${s.id}">—</div><div class="stat-lbl">Avg ${s.unit}</div></div>
        <div class="stat"><div class="stat-val" id="max-${s.id}">—</div><div class="stat-lbl">Max ${s.unit}</div></div>
      </div>
    </div>`;
  sections.appendChild(sec);

  // Chart
  const ctx = document.getElementById("chart-"+s.id).getContext("2d");
  state[s.id].chart = new Chart(ctx, {
    type:"line",
    data:{
      labels:[],
      datasets:[{
        label: s.label,
        data:[],
        borderColor: s.color,
        backgroundColor: s.color+"18",
        borderWidth:2,
        pointRadius:2,
        tension:.35,
        fill:true
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:400},
      plugins:{
        legend:{display:false},
        tooltip:{mode:"index",intersect:false}
      },
      scales:{
        x:{ticks:{color:"#7a8299",font:{size:10},maxTicksLimit:8},grid:{color:"#2a3048"}},
        y:{
          ticks:{color:"#7a8299",font:{size:10},
            callback: v => s.decimals===0 ? v.toFixed(0) : v.toFixed(s.decimals)
          },
          grid:{color:"#2a3048"},
          suggestedMin: s.min + (s.max-s.min)*.05,
          suggestedMax: s.max - (s.max-s.min)*.05
        }
      }
    }
  });
});

// ── Tab switch ────────────────────────────────────────────────────────────
function switchTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.id===id));
  document.querySelectorAll(".section").forEach(s=>s.classList.toggle("active", s.id==="sec-"+id));
}

// ── Period switch ─────────────────────────────────────────────────────────
function switchPeriod(sid, period) {
  const s   = SENSORS.find(x=>x.id===sid);
  const st  = state[sid];
  st.period = period;

  // Update button styles
  ["live","day","mon","year"].forEach(p => {
    const btn = document.getElementById("pb-"+p+"-"+sid);
    if (btn) btn.classList.toggle("active", p===period);
  });

  const chart   = st.chart;
  const changes = document.getElementById("changes-"+sid);
  const meta    = document.getElementById("meta-"+sid);

  if (period === "live") {
    const vals = st.vals;
    chart.data.labels   = vals.map((_,i)=>String(i));   // will be replaced on next tick
    chart.data.datasets[0].data = [...vals];
    chart.options.scales.x.ticks.maxTicksLimit = 6;
    chart.update();
    meta.textContent = "last 30 readings · 2 s interval";
    changes.style.display = "none";
    updateStats(sid, vals, s.decimals);
    return;
  }

  let labels, vals, periodLabel, prevVals;
  if (period === "day") {
    labels = dayLbls; vals = st.histDay;
    periodLabel = "Hourly · today (24 h)";
    // "change" compared to yesterday: fake it as first half vs second half
    prevVals = genHistory(s, 24, 6);
  } else if (period === "mon") {
    labels = monLbls; vals = st.histMon;
    periodLabel = "Daily · this month";
    prevVals = genHistory(s, monLbls.length, 12);
  } else {
    labels = yrLbls; vals = st.histYear;
    periodLabel = "Monthly · this year";
    prevVals = genHistory(s, 12, 20);
  }

  chart.data.labels = labels;
  chart.data.datasets[0].data = vals;
  chart.options.scales.x.ticks.maxTicksLimit = period==="year" ? 12 : 8;
  chart.update();
  meta.textContent = periodLabel;
  updateStats(sid, vals, s.decimals);

  // Change badges
  renderChanges(sid, s, vals, prevVals, period);
  changes.style.display = "flex";
}

function renderChanges(sid, s, curVals, prevVals, period) {
  const row = document.getElementById("changes-"+sid);
  const f   = v => v.toFixed(s.decimals);

  const curAvg  = curVals.reduce((a,b)=>a+b,0)/curVals.length;
  const prevAvg = prevVals.reduce((a,b)=>a+b,0)/prevVals.length;
  const diff    = curAvg - prevAvg;
  const pct     = prevAvg !== 0 ? (diff/prevAvg*100) : 0;

  const curMax  = Math.max(...curVals);
  const prevMax = Math.max(...prevVals);
  const diffMax = curMax - prevMax;
  const pctMax  = prevMax !== 0 ? (diffMax/prevMax*100) : 0;

  const curMin  = Math.min(...curVals);
  const prevMin = Math.min(...prevVals);
  const diffMin = curMin - prevMin;
  const pctMin  = prevMin !== 0 ? (diffMin/prevMin*100) : 0;

  const periodPrev = period==="day" ? "yesterday" : period==="mon" ? "last month" : "last year";
  row.innerHTML = badge("Avg vs "+periodPrev, f(curAvg), diff, pct, s.unit)
                + badge("Max vs "+periodPrev, f(curMax), diffMax, pctMax, s.unit)
                + badge("Min vs "+periodPrev, f(curMin), diffMin, pctMin, s.unit);
}

function badge(lbl, val, diff, pct, unit) {
  const cls  = diff > 0.001 ? "up" : diff < -0.001 ? "down" : "flat";
  const arrow = diff > 0.001 ? "▲" : diff < -0.001 ? "▼" : "—";
  return `<div class="change-badge">
    <div>
      <div class="cb-lbl">${lbl}</div>
      <div class="cb-val ${cls}">${val} <span style="font-size:.65rem;font-weight:400">${unit}</span></div>
      <div class="cb-pct ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}%</div>
    </div>
  </div>`;
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats(sid, vals, dec) {
  if (!vals.length) return;
  const f = v => v.toFixed(dec);
  document.getElementById("min-"+sid).textContent = f(Math.min(...vals));
  document.getElementById("avg-"+sid).textContent = f(vals.reduce((a,b)=>a+b,0)/vals.length);
  document.getElementById("max-"+sid).textContent = f(Math.max(...vals));
}

// ── Live data push ─────────────────────────────────────────────────────────
function fmt(v, dec){ return v.toFixed(dec); }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }
function timeStr(){ return new Date().toLocaleTimeString("en-GB"); }
function barPct(v,mn,mx){ return Math.min(100,Math.max(0,(v-mn)/(mx-mn)*100)).toFixed(1); }

function pushSensor(s){
  const st = state[s.id];
  st.cur = clamp(st.cur + (Math.random()-.48)*s.step*2, s.min, s.max);
  const v   = st.cur;
  const lbl = timeStr();

  st.vals.push(v);
  if(st.vals.length > MAX_PTS) st.vals.shift();

  // Always update main card
  document.getElementById("val-" +s.id).textContent = fmt(v, s.decimals);
  document.getElementById("time-"+s.id).textContent = lbl;
  document.getElementById("bar-" +s.id).style.width = barPct(v,s.min,s.max)+"%";

  // Only update chart/stats if in live mode
  if (st.period !== "live") return;

  const ch = st.chart;
  ch.data.labels.push(lbl);
  ch.data.datasets[0].data.push(v);
  if(ch.data.labels.length > MAX_PTS){ ch.data.labels.shift(); ch.data.datasets[0].data.shift(); }
  ch.update();
  updateStats(s.id, st.vals, s.decimals);
}

// Initial tick
SENSORS.forEach(s => pushSensor(s));
setInterval(() => SENSORS.forEach(s => pushSensor(s)), 2000);

const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,"0");
  var m = String(now.getMinutes()).padStart(2,"0");
  var s = String(now.getSeconds()).padStart(2,"0");
  document.getElementById("hdr-time").textContent = h+":"+m+":"+s;
  document.getElementById("hdr-date").textContent =
    DAYS[now.getDay()]+", "+now.getDate()+" "+MONTHS[now.getMonth()]+" "+now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
